package: im.polaris.qq
name: QQ聊天
version: 1.2.0
brain_version: ">=4.1.0"
app_desc: >-
  这个应用负责 QQ 消息的接收、发送和会话目标管理. 消息会被真实的人看到, 
  所以后续内核通常需要结合上下文判断节奏、语气与是否回复; 短时间内同一会话
  的多条消息往往应综合理解后再处理. 如果需要分多条发送, 应调用多次发送命令, 
  而不是把多条内容拼进同一个 text 字段.
commands:
  - name: send_qq_message
    description: 向一个 QQ 群或会话发送文本消息; 消息发出后会被对方或群成员看到.
    parameters:
      session_id:
        type: string
        description: 群号或 QQ 号
        required: true
      text:
        type: string
        description: 一条实际发出的消息内容; 若要分多条发送, 应多次调用该工具
        required: true
    returns:
      success:
        type: boolean
        description: 是否发送成功
      delivered_at:
        type: number
        description: 实际发送时间戳
  - name: send_qq_private_message
    description: 向指定 QQ 用户发送私聊消息; 私聊内容只有双方可见.
    parameters:
      user_id:
        type: string
        description: 目标 QQ 号
        required: true
      text:
        type: string
        description: 一条实际发出的私聊消息; 若要分多条发送, 应多次调用该工具
        required: true
    returns:
      success:
        type: boolean
        description: 是否发送成功
  - name: at_user_in_group
    description: 在群里 @ 某个用户并发送消息; 被 @ 的用户会收到更强提醒.
    parameters:
      group_id:
        type: string
        description: 群号
        required: true
      user_id:
        type: string
        description: 被 @ 的 QQ 号
        required: true
      text:
        type: string
        description: 一条实际发出的群消息; 若要分多条发送, 应多次调用该工具
        required: true
    returns:
      success:
        type: boolean
        description: 是否发送成功
