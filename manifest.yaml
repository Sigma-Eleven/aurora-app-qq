package: im.polaris.example
name: 示例应用
version: 0.1.0
brain_version: ">=4.1.0"
app_desc: >-
  这个应用用于演示 Aurora 应用的最小结构，以及 PlatformAPI 的主要用法。
  它包含静态命令、动态注册命令、事件上报、日志输出和 app-data 持久化示例。
commands:
  - name: echo_message
    description: 回显一段文本，并上报 example.echoed 事件。
    parameters:
      text:
        type: string
        description: 要回显的文本
        required: true
      session_id:
        type: string
        description: 可选会话 ID
        required: false
      use_post_intention:
        type: boolean
        description: 是否通过 post_intention 上报事件
        required: false
    returns:
      ok:
        type: boolean
        description: 是否执行成功
      echoed_text:
        type: string
        description: 实际回显的文本
      package:
        type: string
        description: 当前应用包名
  - name: save_note
    description: 将一条笔记写入 app-data，并按需发出 example.note_saved 事件。
    parameters:
      title:
        type: string
        description: 笔记标题
        required: true
      content:
        type: string
        description: 笔记内容
        required: true
      emit_event:
        type: boolean
        description: 是否发出保存事件
        required: false
    returns:
      ok:
        type: boolean
        description: 是否保存成功
      note_count:
        type: number
        description: 当前累计笔记条数
  - name: publish_demo_event
    description: 主动发出一个自定义事件，演示应用如何向内核上报事件。
    parameters:
      event_type:
        type: string
        description: 事件类型
        required: false
      summary:
        type: string
        description: 事件摘要
        required: false
      session_id:
        type: string
        description: 可选会话 ID
        required: false
    returns:
      ok:
        type: boolean
        description: 是否执行成功
      emitted_type:
        type: string
        description: 实际发出的事件类型
